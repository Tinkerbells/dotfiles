window:
  padding:
    x: 15
    y: 15
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 1

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono NF
    style: Regular
  bold:
    family: JetBrainsMono NF
    style: Bold
  italic:
    family: JetBrainsMono NF
    style: Italic
  size: 12

draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: false

shell:
  program: /sbin/zsh 
