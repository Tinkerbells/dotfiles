add_newline = false

format = """
$username\
$directory\
$git_branch\
$git_status\
$character
"""
right_format = """$cmd_duration"""

[character]
success_symbol = "[](purple)"
error_symbol   = "[✗](red)"
vicmd_symbol   = "[](green)"

[line_break]
disabled = true

[cmd_duration]
min_time = 0 
format = "[$duration](bold yellow)"

[username]
style_user = "red bold"
style_root = "black bold"
format = '\[[$user]($style)\]'
disabled = false
show_always = true

[directory]
style = "blue"
format = '\[[$path]($style)[$read_only]($read_only_style)\] '
read_only = " "
truncation_length = 10
truncate_to_repo = true

[git_branch]
symbol = " "

